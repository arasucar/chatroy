# Fresh-host overlay.
#
# Use this on a new or disposable machine where this stack owns public ingress.
#
# Example:
#   docker compose -f docker-compose.yml -f docker-compose.fresh-host.yml up -d

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile.fresh-host:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set in .env}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL must be set in .env}
    depends_on:
      web:
        condition: service_healthy
    networks: [edge, internal]

  postgres:
    ports:
      - "127.0.0.1:${POSTGRES_HOST_PORT:-5432}:5432"

  redis:
    ports:
      - "127.0.0.1:${REDIS_HOST_PORT:-6379}:6379"

  ollama:
    ports:
      - "127.0.0.1:${OLLAMA_HOST_PORT:-11434}:11434"

networks:
  edge:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
