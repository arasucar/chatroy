# Phase 0 stack.
#
# Services only reachable from the host are bound to 127.0.0.1 so nothing
# leaks onto the LAN by accident. Caddy is the only service with public ports.
#
# Named volumes keep data out of bind mounts so you can `docker compose down`
# without losing Postgres/Ollama state.

name: roy

services:
  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    environment:
      DOMAIN: ${DOMAIN:?DOMAIN must be set in .env}
      ACME_EMAIL: ${ACME_EMAIL:?ACME_EMAIL must be set in .env}
    depends_on:
      web:
        condition: service_healthy
    networks: [edge, internal]

  web:
    # Phase 0 placeholder. Swap the build context to apps/web in Phase 1.
    build:
      context: ./apps/web-placeholder
    restart: unless-stopped
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [internal]

  postgres:
    # pgvector image is a drop-in for postgres:16 with the extension preinstalled.
    # Installing early avoids a rebuild in Phase 4.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-roy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    # Bind to localhost only so you can connect with psql/TablePlus from the server
    # without exposing the port on the LAN. Comment out if you don't need it.
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  ollama:
    image: ollama/ollama:0.4.7
    restart: unless-stopped
    environment:
      # Keep models loaded longer so the first token after idle is still fast.
      OLLAMA_KEEP_ALIVE: "30m"
      # Let a second request queue instead of rejecting it.
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "2"
    volumes:
      - ollama_models:/root/.ollama
    # Exposed to the host on 127.0.0.1 for the Phase 0 verification step
    # (curl http://localhost:11434/api/generate). Internal services reach it
    # via the compose network on http://ollama:11434.
    ports:
      - "127.0.0.1:11434:11434"
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # /api/tags is cheap and doesn't require a model to be loaded.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [internal]

networks:
  edge:
    driver: bridge
  internal:
    driver: bridge
    internal: false    # flip to true in Phase 8 if you don't need egress from app services

volumes:
  caddy_data:
  caddy_config:
  postgres_data:
  redis_data:
  ollama_models:
