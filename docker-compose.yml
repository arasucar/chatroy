# Base stack shared by every deployment mode.
#
# This file intentionally keeps services on the internal Docker network only.
# Add deployment-specific host bindings through an overlay file:
#   - docker-compose.fresh-host.yml
#   - docker-compose.live-host.yml
#   - docker-compose.admin-ports.yml
#
# Named volumes keep data out of bind mounts so you can `docker compose down`
# without losing Postgres/Ollama state.

services:
  llm-hello:
    # Project 1 inference wrapper. Profile-gated so it does not alter the
    # default Project 2/3 stack shape until explicitly requested.
    profiles: ["project1"]
    build:
      context: ./apps/llm-hello
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_CHAT_MODEL: ${OLLAMA_CHAT_MODEL:-qwen2.5:7b-instruct-q4_K_M}
    expose:
      - "3000"
    depends_on:
      ollama:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [internal]

  web:
    # Phase 1 shell. Auth, data access, and chat still need to be wired.
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
    expose:
      - "3000"
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://localhost:3000/healthz"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    networks: [internal]

  postgres:
    # pgvector image is a drop-in for postgres:16 with the extension preinstalled.
    # Installing early avoids a rebuild in Phase 4.
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-roy}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  redis:
    image: redis:7.4-alpine
    restart: unless-stopped
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:?REDIS_PASSWORD must be set}", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "--no-auth-warning", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [internal]

  ollama:
    image: ollama/ollama:0.4.7
    restart: unless-stopped
    environment:
      # Keep models loaded longer so the first token after idle is still fast.
      OLLAMA_KEEP_ALIVE: "30m"
      # Let a second request queue instead of rejecting it.
      OLLAMA_NUM_PARALLEL: "1"
      OLLAMA_MAX_LOADED_MODELS: "2"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      # /api/tags is cheap and doesn't require a model to be loaded.
      test: ["CMD-SHELL", "ollama list >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [internal]

networks:
  internal:
    driver: bridge
    internal: false    # flip to true in Phase 8 if you don't need egress from app services

volumes:
  postgres_data:
  redis_data:
  ollama_models:
