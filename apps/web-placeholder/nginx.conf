server {
    listen 3000;
    server_name _;

    # Plain-text healthcheck for Caddy, load balancers, and manual curl.
    location = /healthz {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    # Everything else falls through to the landing page.
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ =404;
    }
}
